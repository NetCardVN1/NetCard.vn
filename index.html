<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetCard.vn - Shop Game VIP</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #ff4747; --dark: #0b0b0b; --card: #1a1a1a; }
        body { font-family: sans-serif; background: var(--dark); color: #fff; margin: 0; padding-bottom: 60px; }
        .container { max-width: 500px; margin: auto; padding: 10px; }
        .flash-sale { background: linear-gradient(90deg, #ff4747, #ff8c00); padding: 10px; text-align: center; font-weight: bold; font-size: 12px; }
        .marquee-box { background: rgba(0,0,0,0.6); border: 1px solid #222; padding: 5px; display: flex; align-items: center; gap: 8px; margin: 10px 0; border-radius: 4px; }
        .marquee-gif { height: 20px; }
        marquee { color: #2ecc71; font-weight: bold; font-size: 11px; }
        #chatbot-bubble { position: fixed; bottom: 80px; right: 20px; z-index: 999; cursor: pointer; }
        #chatbot-bubble img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--primary); box-shadow: 0 0 15px var(--primary); }
    </style>
</head>
<body>
    <div class="flash-sale">🔥 FLASH SALE: 16h : 35m : 27s (Kết thúc ngày mai)</div>
    <div class="marquee-box">
        <img src="assets/run.gif" class="marquee-gif">
        <marquee>🎊 Người dùng User_ABC123 đã nạp thành công 500.000đ!</marquee>
    </div>
    <div class="container">
        <div style="background:var(--card); padding:15px; border-radius:8px; border:1px solid #333; margin-bottom:15px;">
            <h4 style="text-align:center; color:var(--primary); margin:0 0 10px 0;">NẠP THẺ TỰ ĐỘNG</h4>
            <input type="text" placeholder="Mã thẻ / Seri" style="width:100%; padding:12px; background:#000; border:1px solid #444; color:#fff; border-radius:6px; box-sizing:border-box;">
            <button style="width:100%; padding:12px; background:var(--primary); color:#fff; border:none; font-weight:bold; margin-top:10px; border-radius:6px;">NẠP NGAY</button>
        </div>
    </div>
    <div id="chatbot-bubble" onclick="alert('🤖 HD Nạp Thẻ:\nB1: Cào lấy mã.\nB2: Nhập mã + Seri.\nB3: Chờ hệ thống duyệt.\n⚠️ Nhập đúng mệnh giá nha ní!')">
        <img src="assets/livechatbot (1).gif">
    </div>
</body>
</html>
