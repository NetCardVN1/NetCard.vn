<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Săn Túi Mù Free Fire - NetCard.vn</title>
    <link rel="icon" href="assets/favicon.png">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #ff4747; --dark: #0b0b0b; --card: #151515; --orange: #ff8c00; --green: #2ecc71; }
        body { font-family: 'Roboto', sans-serif; background: var(--dark); color: #fff; margin: 0; padding: 15px; padding-bottom: 50px; }
        .container { max-width: 500px; margin: 0 auto; }
        
        /* Header quay lại */
        .header-back { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; cursor: pointer; color: #fff; text-decoration: none; }
        .section-title { margin: 0; font-weight: bold; color: var(--orange); border-left: 5px solid var(--orange); padding-left: 12px; font-size: 18px; text-transform: uppercase; }

        /* Grid Túi Mù Phong Cách Card */
        .grid-tuimu { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .card-tuimu { background: var(--card); border-radius: 12px; border: 1px solid #333; overflow: hidden; text-align: center; cursor: pointer; transition: 0.3s; position: relative; }
        .card-tuimu:hover { border-color: var(--primary); transform: translateY(-3px); }
        
        /* Banner Túi Mù */
        .card-tuimu img { width: 100%; height: 120px; object-fit: cover; }
        .price-tag { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: var(--orange); font-weight: bold; padding: 3px 8px; border-radius: 5px; font-size: 11px; }

        .card-info { padding: 10px; }
        .card-name { font-size: 12px; font-weight: bold; text-transform: uppercase; color: #eee; margin-bottom: 10px; display: block; height: 32px; overflow: hidden; }
        
        /* Thông số Chưa bán/Đã bán */
        .card-stats { display: flex; justify-content: space-around; font-size: 10px; border-top: 1px solid #222; padding-top: 8px; margin-bottom: 12px; }
        .card-stats b { display: block; font-size: 14px; }
        .txt-green { color: var(--green); }
        .txt-red { color: #e74c3c; }

        .btn-open { background: var(--primary); color: #fff; border: none; width: 90%; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="header-back">
        <i class="fa fa-arrow-left"></i> <b>Quay lại trang chủ</b>
    </a>
    
    <div class="section-title">🎁 SĂN TÚI MÙ FF NGẪU NHIÊN</div>

    <div class="grid-tuimu">
        <div class="card-tuimu" onclick="preOpen('Túi Mù Đại Gia', 'assets/tuimu_daigia.gif', 499000)">
            <img src="assets/tuimu_daigia.gif" alt="Túi Mù Đại Gia">
            <div class="price-tag">499K</div>
            <div class="card-info">
                <span class="card-name">BOX ĐẠI GIA - RANDOM QUÀ VIP</span>
                <div class="card-stats">
                    <div><b class="txt-green">300</b>Chưa bán</div>
                    <div><b class="txt-red">1,203</b>Đã bán</div>
                </div>
                <button class="btn-open">MỞ NGAY</button>
            </div>
        </div>

        <div class="card-tuimu" onclick="preOpen('Túi Mù Sinh Viên', 'assets/tuimu_sinhvien.gif', 99000)">
            <img src="assets/tuimu_sinhvien.gif" alt="Túi Mù Sinh Viên">
            <div class="price-tag">99K</div>
            <div class="card-info">
                <span class="card-name">BOX SINH VIÊN - RANDOM ACC FF</span>
                <div class="card-stats">
                    <div><b class="txt-green">500</b>Chưa bán</div>
                    <div><b class="txt-red">9,931</b>Đã bán</div>
                </div>
                <button class="btn-open">MỞ NGAY</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Kiểm tra đăng nhập như trong ghi chú
    if (localStorage.getItem('isLoggedIn') !== 'true') { window.location.href = 'auth.html'; }

    // Hàm hỏi trước khi mở
    function preOpen(name, gif, price) {
        Swal.fire({
            title: "Bạn chắc không?",
            text: `Bạn muốn mở ${name} với giá ${price.toLocaleString()}đ chứ?`,
            icon: "question",
            showCancelButton: true,
            confirmButtonColor: "#3085d6",
            cancelButtonColor: "#d33",
            confirmButtonText: "Mở ngay, tôi sướng!"
        }).then((result) => {
            if (result.isConfirmed) {
                // Giả lập check số dư (ví dụ 0đ)
                let userBalance = 0; 

                if (userBalance < price) {
                    // Thất bại: Sử dụng đúng mẫu lừa đảo
                    Swal.fire({
                        icon: "error",
                        title: "Thất bại",
                        text: "Số dư không đủ (0đ), vui lòng nạp thêm ní ơi!",
                        footer: '<a href="napthe.html">Nạp tiền ngay tại đây?</a>'
                    });
                } else {
                    // Thành công: Hiện hiệu ứng nổ gif
                    showOpeningEffect(name, gif);
                }
            }
        });
    }

    // Hiệu ứng mở túi mờ ảo
    function showOpeningEffect(name, gif) {
        let timerInterval;
        Swal.fire({
            title: `Đang mở ${name}...`,
            html: `
                <div style="text-align:center;">
                    <img src="${gif}" width="100" class="animated tada infinite" style="margin-bottom:15px;">
                    <p style="font-size:12px; color:#aaa;">Quà đang bay về kho... <b id="countdown_open">3s</b></p>
                </div>
            `,
            timer: 3000,
            timerProgressBar: true,
            background: '#0b0b0b',
            color: '#fff',
            didOpen: () => {
                Swal.showLoading();
                const timer = Swal.getHtmlContainer().querySelector('#countdown_open');
                timerInterval = setInterval(() => {
                    timer.textContent = `${Math.ceil(Swal.getTimerLeft() / 1000)}s`;
                }, 100);
            },
            willClose: () => { clearInterval(timerInterval); }
        }).then((result) => {
            if (result.dismiss === Swal.DismissReason.timer) {
                // Kết quả thành công theo mẫu
                Swal.fire({ 
                    title: "Thành công!", 
                    text: `Ní đã nhận được quà từ ${name}! Vào lịch sử để xem nhé.`, 
                    icon: "success" 
                });
            }
        });
    }
</script>
</body>
</html>
