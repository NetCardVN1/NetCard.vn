<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - NetCard.vn</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #0b0b0b; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { width: 90%; max-width: 350px; background: #1a1a1a; padding: 25px; border-radius: 12px; border: 1px solid #333; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #ff4747; border: none; color: #fff; font-weight: bold; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2 style="color:#ff4747">NETCARD.VN</h2>
        <input type="text" id="u" placeholder="Tên đăng nhập">
        <input type="password" id="p" placeholder="Mật khẩu">
        <button class="btn" onclick="handleAuth()">VÀO SHOP</button>
        <p onclick="toggleMode()" id="toggleBtn" style="font-size:12px; color:#888; cursor:pointer; margin-top:15px;">Chưa có tài khoản? Đăng ký</p>
    </div>

    <script>
        let isLogin = true;
        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('toggleBtn').innerText = isLogin ? "Chưa có tài khoản? Đăng ký" : "Đã có tài khoản? Đăng nhập";
        }

        function handleAuth() {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            if(!user || !pass) return Swal.fire('Lỗi', 'Nhập đủ tin ní ơi!', 'error');

            if(!isLogin) {
                // ĐĂNG KÝ: Lưu thông tin vào 'userData'
                localStorage.setItem('userData', JSON.stringify({u: user, p: pass, b: 0}));
                Swal.fire('Xong', 'Tạo tài khoản thành công!', 'success').then(() => location.reload());
            } else {
                // ĐĂNG NHẬP: Kiểm tra 'userData'
                const data = JSON.parse(localStorage.getItem('userData'));
                if(data && data.u === user && data.p === pass) {
                    localStorage.setItem('isLogged', 'true'); // Đánh dấu đã đăng nhập
                    window.location.href = 'index.html';
                } else {
                    Swal.fire('Lỗi', 'Sai tài khoản hoặc mật khẩu!', 'error');
                }
            }
        }
    </script>
</body>
</html>
