<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Túi Mù (Random Box) - NetCard.vn</title>
    <style>
        body { background: #0b0b0b; color: #fff; font-family: sans-serif; padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; overflow: hidden; }
        .info { padding: 10px; font-size: 11px; }
        .stats { color: #888; border: 1px dashed #444; padding: 5px; margin: 8px 0; border-radius: 4px; }
        .btn { width: 100%; padding: 10px; background: #ff8c00; border: none; color: #fff; font-weight: bold; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <h3 style="border-left:4px solid #ff4747; padding-left:10px;">🎁 TÚI MÙ (RANDOM BOX)</h3>
    <div class="grid">
        <div class="card">
            <img src="assets/1000018749.gif" style="width:100%;">
            <div class="info">
                <div style="font-weight:bold; text-align:center;">TÚI MÙ ĐẠI GIA - 499K</div>
                <div class="stats">Mã số: #0001<br>Súng: ???<br>Rank: ???<br>Trang phục: ???</div>
                <button class="btn">MUA NGAY</button>
            </div>
        </div>
        <div class="card">
            <img src="assets/1000018750.gif" style="width:100%;">
            <div class="info">
                <div style="font-weight:bold; text-align:center;">TÚI MÙ SINH VIÊN - 99K</div>
                <div class="stats">Mã số: #0002<br>Súng: ???<br>Rank: ???<br>Trang phục: ???</div>
                <button class="btn" style="background:#2ecc71;">MUA NGAY</button>
            </div>
        </div>
    </div>
</body>
</html>
